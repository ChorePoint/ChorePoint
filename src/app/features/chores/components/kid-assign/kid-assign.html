@for (kid of kids; track kid.id) {
  <div
    class="assign-chip"
    [class.selected]="selectedKid === kid.id"
    (click)="selectedKidChange.emit(kid.id)"
  >
    <div
      class="assign-avatar avatar-blue"
      style="background: linear-gradient(135deg, #87ceeb, #5aafd4)"
    >
      {{ kid.avatar }}
    </div>
    <div class="assign-name">{{ kid.name }}</div>
  </div>
}
<div class="assign-chip" [class.selected]="selectedKid === -1" (click)="selectedKidChange.emit(-1)">
  <div
    class="assign-avatar avatar-blue"
    style="background: linear-gradient(135deg, #87ceeb, #5aafd4)"
  >
    ➕
  </div>
  <div class="assign-name">All</div>
</div>
