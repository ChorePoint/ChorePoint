@if (kids.length > 0) {
  <div class="child-selector">
    <div
      (click)="onKidSelected(null)"
      class="child-chip"
      [class]="selectedKidId === -1 ? 'active' : ''"
    >
      All
    </div>
    @for (kid of kids; track kid.kidId) {
      <div
        (click)="onKidSelected(kid)"
        class="child-chip"
        [class]="selectedKidId === kid.kidId ? 'active' : ''"
      >
        {{ kid.name }}
      </div>
    }
  </div>
} @else {
  <div>
    <div class="no-kids">{{ kidHeaderText }}</div>
  </div>
}
