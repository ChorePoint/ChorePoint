@for (kid of kids; track kid.kidId) {
  <div class="assign-chip" [class.selected]="isSelected(kid.kidId)" (click)="select(kid.kidId)">
    <div
      class="assign-avatar avatar-blue"
      style="background: linear-gradient(135deg, #87ceeb, #5aafd4)"
    >
      {{ kid.avatar }}
    </div>
    <div class="assign-name">{{ kid.name }}</div>
  </div>
}
<div
  class="assign-chip"
  [class.selected]="(selectedKids?.length ?? 1) > 1"
  (click)="selectedKidChange.emit(-1)"
>
  <div
    class="assign-avatar avatar-blue"
    style="background: linear-gradient(135deg, #87ceeb, #5aafd4)"
  >
    ➕
  </div>
  <div class="assign-name">All</div>
</div>
